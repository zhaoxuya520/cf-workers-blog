<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Writer · zhaoxu的个人博客</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">✦</div>
          <div class="brand-text">
            <div class="brand-title">Writer</div>
            <div class="brand-sub">Ghost 风格 · 本地发布</div>
          </div>
        </div>

        <div class="side-actions">
          <button class="btn primary" id="newPost">新建文章</button>
          <button class="btn danger" id="deletePost" disabled>删除文章</button>
          <button class="btn" id="publish">发布到博客</button>
        </div>

        <div class="status" id="status"></div>

        <div class="side-head">
          <div class="side-title">文章</div>
          <input class="search" id="search" type="search" placeholder="搜索标题…" />
        </div>
        <div class="posts" id="posts"></div>
      </aside>

      <main class="main">
        <header class="top">
          <div class="meta">
            <label class="field">
              <span class="label">文件名</span>
              <input id="filename" class="input mono" placeholder="YYYY-MM-DD-slug.md" />
            </label>
            <label class="field">
              <span class="label">标题</span>
              <input id="title" class="input" placeholder="文章标题…" />
            </label>
            <label class="field">
              <span class="label">时间</span>
              <input id="date" class="input mono" placeholder="2025-12-18 12:00:00 +0800" />
            </label>
            <label class="field">
              <span class="label">标签</span>
              <input id="tags" class="input" placeholder="用逗号分隔，例如：前端,随笔" />
            </label>
            <label class="field">
              <span class="label">封面图</span>
              <div class="cover-input">
                <input id="cover" class="input" placeholder="封面图路径，如 /assets/uploads/2025/01/cover.jpg" />
                <input id="coverFile" class="file" type="file" accept="image/*" hidden />
                <button class="btn small" id="uploadCover" type="button">上传</button>
              </div>
            </label>
          </div>

          <div class="top-actions">
            <input id="imageFile" class="file" type="file" accept="image/*" hidden />
            <button class="btn" id="insertImage">插入图片</button>
            <button class="btn" id="format">自动补全</button>
            <button class="btn primary" id="save">保存</button>
          </div>
        </header>

        <section class="editor">
          <div class="pane">
            <div class="pane-head">
              <div class="pane-title">Markdown</div>
              <div class="pane-hint">支持：标题/粗体/代码块/列表/链接</div>
            </div>
            <textarea id="md" class="textarea" spellcheck="false" placeholder="# 从这里开始写…"></textarea>
          </div>
          <div class="pane preview">
            <div class="pane-head">
              <div class="pane-title">预览</div>
              <div class="pane-hint">本地渲染（轻量）</div>
            </div>
            <div id="preview" class="preview-body"></div>
          </div>
        </section>

        <section class="log">
          <div class="log-head">发布日志</div>
          <pre id="log" class="log-body"></pre>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
